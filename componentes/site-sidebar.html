<aside class="siteSidebar" data-sidebar data-most-read='{{mostRead}}' data-recent='{{recent}}'>
    <div class="sideCard">
        <div class="sideCard__title"><span class="sideCard__icon">
                <i class="bi bi-graph-up-arrow"></i>
            </span><span style="margin-left:8px">Más leídos</span></div>
        <ol class="sideList" role="list" aria-label="Más leídos">
        </ol>
    </div>

    <div class="sidebar-card">
        <h3 class="sidebar-title"><i class="bi bi-journal-bookmark"></i> Más recientes</h3>
        <ul class="recent-list">
        </ul>
    </div>

    <div class="subscribe-card">
    <h4>📬 Mantente informado</h4>
    <p style="color: white;">Recibe las últimas guías y actualizaciones de trámites en Perú.</p>

    <form class="subscribe-form" action="https://formspree.io/f/mjgpvnlb" method="POST">
        <input class="subscribe-input" type="email" name="email" placeholder="tu@email.com" required />
        <button class="subscribe-btn" type="submit">Suscribirme</button>
        <p class="subscribe-msg" style="color:white !important; display:none; margin-top: 10px; font-size: 0.9rem; font-weight: 500;"></p>
    </form>
</div>
</aside>
