<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Trámites Personales – TrámitesPeru</title>
    <link rel="stylesheet" href="../../styles.css" />
    <link rel="stylesheet" href="../../assets/css/post-card.css">
    <link rel="stylesheet" href="../../assets/css/sidebar.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body>

    <header data-include="../../componentes/navbar-into.html"></header>

    <!-- Category Hero -->
    <section class="catHero_salud">
        <div class="container">

            <nav class="crumbs" aria-label="breadcrumb">
                <a href="../../index.html">
                    <i class="bi bi-house"></i>
                </a>
                <i class="bi bi-chevron-right"></i>
                <span>Salud y Seguros</span>
            </nav>

            <div class="catHero__head">
                <div class="catHero__badge" aria-hidden="true">
                    <!-- doc icon -->
                    <i class="bi bi-heart-pulse"></i>
                </div>

                <div>
                    <h1 class="catHero__title">Salud y Seguros</h1>
                    <p class="catHero__sub">
                        Información sobre SIS, EsSalud, citas médicas, seguros de salud y todos los servicios médicos
                        del Estado peruano.
                    </p>
                    <div class="catHero__count">2 guías disponibles</div>
                </div>
            </div>

        </div>
    </section>

    <main>
        <div class="container-lg px-4 px-lg-5">
            <div class="catGrid">
                <section class="catCards" aria-label="Listado de guías de trámites laborales">
                    <post-card title="Sacar Citas SIS – Cómo acceder a atención médica"
                        image="../../fotos/citas sis.png" tags='[{"label":"Empleo","color":"blue"}]'
                        description="Aprende a solicitar citas médicas en los centros de salud a través del SIS. Conoce los canales virtuales, telefónicos y presenciales para recibir atención gratuita en todo el Perú."
                        readtime="4-5 min de lectura" views="12,350" url="citas-sis.html">
                    </post-card>


                </section>
                <aside class="catSide" aria-label="Sidebar">
                    <div data-include="../../componentes/site-sidebar.html"></div>
                </aside>
            </div>
    </main>

    <div data-include="../../componentes/site-footer.html"></div>
    <script defer src="../../assets/js/site-footer.js"></script>
    <script defer src="../../assets/js/includes.js"></script>
    <script defer src="../../assets/js/post-card.js"></script>
    <script defer src="../../assets/js/site-sidebar.js"></script>
