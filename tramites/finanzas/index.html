<body>
    <header data-include="../../componentes/navbar-into.html"></header>
    <!-- Category Hero -->
    <section class="catHero_finance">
        <div class="container">

            <nav class="crumbs" aria-label="breadcrumb">
                <a href="../../index.html">
                    <i class="bi bi-house"></i>
                </a>
                <i class="bi bi-chevron-right"></i>
                <span>Finanzas y Beneficios</span>
            </nav>

            <div class="catHero__head">
                <div class="catHero__badge" aria-hidden="true">
                    <i class="bi bi-cash-coin"></i>
                </div>

                <div>
                    <h1 class="catHero__title">Finanzas y Beneficios</h1>
                    <p class="catHero__sub">
                        Todo sobre AFP, ONP, consultas SUNAT, bonos del Estado, retiro de fondos y beneficios económicos
                        disponibles.
                    </p>
                    <div class="catHero__count">2 guías disponibles</div>
                </div>
            </div>

        </div>
    </section>

    <main>
        <div class="container-lg px-4 px-lg-5 pb-5">
            <div class="catGrid">
                <section class="catCards" aria-label="Listado de guías de trámites laborales">
                    <post-card title="Consultar AFP en Perú – Cómo saber en qué AFP estás afiliado"
                        image="../../fotos/afp.jpg" tags='[{"label":"Empleo","color":"blue"}]'
                        description="¿No sabes a qué AFP perteneces? Aprende a consultar tu estado de afiliación en el reporte oficial de la SBS y conoce si aportas a Integra, Prima, Profuturo o Habitat."
                        readtime="4-5 min de lectura" views="12,350" url="consulta-afp.html">
                    </post-card>

                    <post-card title="Consultar RUC en SUNAT – Cómo verificar datos de una empresa o persona"
                        image="../../fotos/ruc.jpg" tags='[{"label":"Derechos","color":"green"}]'
                        description="Utiliza la plataforma de Consulta Amigable de SUNAT para verificar si un RUC está activo, habido y cuál es su régimen tributario. Evita problemas en tus facturaciones."
                        readtime="4 min de lectura" views="8,920" url="consulta-ruc.html">
                    </post-card>
                </section>
                <aside class="catSide" aria-label="Sidebar">
                    <div data-include="../../componentes/site-sidebar.html"></div>
                </aside>
            </div>
