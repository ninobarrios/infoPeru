        <a href="../../index.html">

        </a>
        <span class="crumbs__sep">›</span>
        <span>Trámites Personales</span>
      </nav>

      <div class="catHero__head">
        <div class="catHero__badge" aria-hidden="true">
          <!-- doc icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
            class="bi bi-file-earmark-text" viewBox="0 0 16 16">
            <path
              d="M5.5 7a.5.5 0 0 0 0 1h5a.5.5 0 0 0 0-1zM5 9.5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5m0 2a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1h-2a.5.5 0 0 1-.5-.5">

              d="M9.5 0H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V4.5zm0 1v2A1.5 1.5 0 0 0 11 4.5h2V14a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1z">
            </path>
          </svg>
        </div>

        <div>
          <h1 class="catHero__title">Trámites Personales</h1>
          <p class="catHero__sub">
            Guías completas sobre DNI, pasaportes, licencias de conducir, certificados de antecedentes y
            más trámites personales en Perú.
          </p>
          <div class="catHero__count">2 guías disponibles</div>
        </div>
      </div>

    </div>

  <main>
    <div class="container-lg px-4 px-lg-5">
      <div class="catGrid">
        <section class="catCards" aria-label="Listado de guías de trámites laborales">


          <post-card title="Renovar DNI para Mayores de 17 Años – Requisitos y pasos"
            image="../../fotos/DNI 17 AÑOS.png" tags='[{"label":"Identidad","color":"blue"}]'
            description="Guía completa para renovar tu DNI azul o electrónico. Conoce los costos, fotos permitidas y cómo realizar el trámite presencial o virtual en RENIEC."
            readtime="5 min de lectura" views="12,350" url="renovar-dni-17.html">
          </post-card>

          <post-card title="Partida de Nacimiento en Perú – Cómo obtenerla y para qué sirve"
            image="../../fotos/partida de nacimiento nueva.png" tags='[{"label":"Documentos","color":"green"}]'
            description="Descubre cómo solicitar tu acta o partida de nacimiento de forma legal. Te explicamos los usos más comunes y los canales de atención disponibles."
            readtime="4 min de lectura" views="8,920" url="partida-nacimiento.html">
          </post-card>

          <post-card title="Sacar Licencia de Conducir en Perú – Requisitos y pasos"
            image="../../fotos/licencia de conducir.jpg" tags='[{"label":"Transporte","color":"orange"}]'
            description="Todo lo que necesitas saber para obtener tu brevete por primera vez: exámenes médicos, reglas de tránsito y la prueba de manejo paso a paso."
            readtime="6 min de lectura" views="15,200" url="licencia-conducir.html">
          </post-card>

          <post-card title="Duplicado de Licencia de Conducir – Cómo tramitarlo por pérdida o robo"
            image="../../fotos/duplicado licencia.jpg" tags='[{"label":"Transporte","color":"orange"}]'
            description="¿Perdiste tu brevete? Solicita el duplicado de tu licencia de conducir electrónica o física de manera rápida y evita multas por conducir sin documentos."
            readtime="3 min de lectura" views="5,430" url="duplicado-licencia-conducir.html">
          </post-card>

          <post-card title="Duplicado de DNI en Perú – Requisitos y cómo tramitarlo"
            image="../../fotos/duplicado dni.jpg" tags='[{"label":"Identidad","color":"blue"}]'
            description="Manual rápido para obtener una copia idéntica de tu DNI vigente por internet o en oficina. Conoce las tasas de pago en el Banco de la Nación o Págalo.pe."
            readtime="4 min de lectura" views="9,100" url="duplicado-dni.html">
          </post-card>

          <post-card title="Copia Certificada de Partida de Nacimiento – Cómo solicitarla en RENIEC"
            image="../../fotos/partida de nacimiento.png" tags='[{"label":"Documentos","color":"green"}]'
            description="Obtén una copia fiel de tu acta de nacimiento con validez legal para trámites judiciales o administrativos. Disponible en plataformas virtuales y MAC."
            readtime="3 min de lectura" views="6,750" url="copia-certificada-partida-nacimiento.html">
          </post-card>

          <post-card title="Consultar Papeletas de Tránsito – Cómo verificar multas vehiculares"
            image="../../fotos/consulta papeletas.png" tags='[{"label":"Vehículos","color":"red"}]'
            description="Evita problemas al vender tu auto o renovar documentos. Aprende a consultar papeletas pendientes en el SAT, SUTRAN y el Registro de Récord del Conductor."
            readtime="4 min de lectura" views="22,100" url="consultar-papeletas-transito.html">
          </post-card>

          <post-card title="Antecedentes Policiales, Judiciales y Penales – Cómo obtenerlos en Perú"
            image="../../fotos/antecedentes policiales.png" tags='[{"label":"Legal","color":"purple"}]'
            description="Guía unificada para tramitar tus certificados de antecedentes. Indispensable para postulaciones laborales y trámites de residencia o viajes."
            readtime="5 min de lectura" views="18,400" url="antecedentes-policiales-judiciales-penales.html">
          </post-card>
        </section>
