<body>

    <header data-include="../../componentes/navbar-into.html"></header>
    <!-- Category Hero -->
    <section class="catHero_migraciones">
        <div class="container">

            <nav class="crumbs" aria-label="breadcrumb">
                <a href="../../index.html">

                <span class="crumbs__sep">›</span>
                <span>Migraciones</span>
            </nav>

            <div class="catHero__head">

                    <i class="bi bi-briefcase"></i>
                </div>

                <div>
                    <h1 class="catHero__title">Migraciones</h1>
                    <p class="catHero__sub">
                        Guía completa sobre trámites migratorios en el Perú: obtención de pasaporte, prórrogas de
                        permanencia,
                        Cambio de Calidad Migratoria, Carné de Extranjería y todos los procesos ante la Superintendencia
                        Nacional de Migraciones.
                    </p>
                    <div class="catHero__count">2 guías disponibles</div>
                </div>
            </div>

        </div>
    </section>

    <main>
        <div class="container-lg px-4 px-lg-5">
            <div class="catGrid">
                <section class="catCards" aria-label="Listado de guías de trámites laborales">
                    <post-card title="Obtener Carné de Extranjería en Perú – Requisitos y trámite en Migraciones"
                        image="../../fotos/carnet extranjeria.jpg" tags='[{"label":"Empleo","color":"blue"}]'
                        description="Guía completa para ciudadanos extranjeros sobre cómo obtener el carné de extranjería. Requisitos para calidad migratoria de trabajador, familiar o especial."
                        readtime="4-5 min de lectura" views="12,350" url="carne-extranjeria.html">
                    </post-card>

                    <post-card title="Pasaporte urgente en Perú – Cómo tramitarlo en casos de emergencia"
                        image="../../fotos/pasaporte urgente.jpg" tags='[{"label":"Derechos","color":"green"}]'
                        description="¿Tienes un vuelo programado en menos de 48 horas? Conoce los pasos para tramitar tu pasaporte de emergencia en el aeropuerto o sedes de Migraciones."
                        readtime="4 min de lectura" views="8,920" url="pasaporte-urgente.html">
                    </post-card>

                    <post-card title="Tramitar Pasaporte Peruano – Requisitos, costo y pasos"
                        image="../../fotos/pasaporte.jpg" tags='[{"label":"Empleo","color":"blue"}]'
                        description="Todo sobre el pasaporte electrónico biométrico: cómo pagar la tasa en el Banco de la Nación, sacar cita virtual y los documentos necesarios para adultos y menores."
                        readtime="4-5 min de lectura" views="12,350" url="pasaporte.html">
                    </post-card>

                    <post-card title="Renovar Pasaporte Peruano – Requisitos y cómo actualizar tu documento"
                        image="../../fotos/renovar pasaporte.jpg" tags='[{"label":"Derechos","color":"green"}]'
                        description="Guía actualizada para la revalidación de tu pasaporte vencido o próximo a caducar. Conoce el procedimiento para obtener un nuevo documento con vigencia de 10 años."
