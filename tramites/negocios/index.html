<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Trámites Personales – TrámitesPeru</title>
    <link rel="stylesheet" href="../../styles.css" />
    <link rel="stylesheet" href="../../assets/css/navbar.css">
    <link rel="stylesheet" href="../../assets/css/post-card.css">
    <link rel="stylesheet" href="../../assets/css/sidebar.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


</head>

<body>

    <header data-include="../../componentes/navbar-into.html"></header>
    <!-- Category Hero -->
    <section class="catHero_negocios">
        <div class="container">

            <nav class="crumbs" aria-label="breadcrumb">
                <a href="../../index.html">
                    <i class="bi bi-house"></i>
                </a>
                <span class="crumbs__sep">›</span>
                <span>Negocios</span>
            </nav>

            <div class="catHero__head">
                <div class="catHero__badge" aria-hidden="true">
                    <!-- doc icon -->
                    <i class="bi bi-briefcase"></i>
                </div>

                <div>
                    <h1 class="catHero__title">Negocios</h1>
                    <p class="catHero__sub">
                        Todo lo que necesitas para emprender y gestionar tu empresa en Perú. Guías completas sobre
                        formalización jurídica, obligaciones tributarias ante SUNAT, licencias municipales, permisos
                        sectoriales.
                    </p>
                    <div class="catHero__count">2 guías disponibles</div>
                </div>
            </div>

        </div>
    </section>

    <main>
        <div class="container-lg px-4 px-lg-5">
            <div class="catGrid">
                <section class="catCards" aria-label="Listado de guías de trámites laborales">
                    <post-card title="Constituir una Empresa en Perú – Requisitos, pasos y costos"
                        image="../../fotos/constitucion de empresa.jpg" tags='[{"label":"Empleo","color":"blue"}]'
                        description="Guía detallada para formalizar tu negocio: desde la elaboración de la minuta y la escritura pública hasta la inscripción en SUNARP. Conoce los costos notariales y registrales actualizados."
                        readtime="4-5 min de lectura" views="12,350" url="constitucion-empresa.html">
                    </post-card>

                    <post-card title="Licencia de Funcionamiento Municipal – Requisitos para abrir un negocio"
                        image="../../fotos/licencia de funcionamiento.png" tags='[{"label":"Derechos","color":"green"}]'
                        description="Aprende cómo obtener la autorización municipal para tu local. Te explicamos los requisitos según el nivel de riesgo, zonificación y el certificado de Inspección Técnica de Seguridad (ITSE)."
                        readtime="4 min de lectura" views="8,920" url="licencia-funcionamiento-municipal.html">
                    </post-card>
                </section>
                <aside class="catSide" aria-label="Sidebar">
                    <div data-include="../../componentes/site-sidebar.html"></div>
                </aside>
            </div>
    </main>

    <div data-include="../../componentes/site-footer.html"></div>
    <script defer src="../../assets/js/site-footer.js"></script>
    <script defer src="../../assets/js/includes.js"></script>
