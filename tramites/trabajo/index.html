<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Trámites Personales – TrámitesPeru</title>
    <link rel="stylesheet" href="../../styles.css" />
    <link rel="stylesheet" href="../../assets/css/post-card.css">
    <link rel="stylesheet" href="../../assets/css/sidebar.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">


</head>

<body>

    <header data-include="../../componentes/navbar-into.html"></header>
    <!-- Category Hero -->
    <section class="catHero_trabajo">
        <div class="container">

            <nav class="crumbs" aria-label="breadcrumb">
                <a href="../../index.html">
                    <i class="bi bi-house"></i>
                </a>
                <i class="bi bi-chevron-right"></i>
                <span>Trabajo</span>
            </nav>

            <div class="catHero__head">
                <div class="catHero__badge" aria-hidden="true">
                    <!-- doc icon -->
                    <i class="bi bi-briefcase"></i>
                </div>

                <div>
                    <h1 class="catHero__title">Trabajo</h1>
                    <p class="catHero__sub">
                        Guía completa sobre contratos laborales, CTS, liquidaciones, gratificaciones, aportes a AFP/ONP
                        y todos los trámites ante el Ministerio de Trabajo (MTPE) y SUNAFIL.
                    </p>
                    <div class="catHero__count">2 guías disponibles</div>
                </div>
            </div>

        </div>
    </section>

    <main>
        <div class="container-lg px-4 px-lg-5 pb-5">
            <div class="catGrid">
                <section class="catCards" aria-label="Listado de guías de trámites laborales">
                    <post-card title="Certificado Único Laboral (CUL) – Cómo obtenerlo gratis en línea"
                        image="../../fotos/cul.jpg" tags='[{"label":"Empleo","color":"blue"}]'
                        description="Obtén tu Certificado Único Laboral (Certiadulto o Certijoven) de forma gratuita. Reúne antecedentes penales, judiciales y experiencia laboral en un solo documento oficial."
                        readtime="4-5 min de lectura" views="12,350" url="certificado-unico-laboral.html">
                    </post-card>

                    <post-card title="Certificado o Constancia Laboral – Cómo solicitarla a tu empleador"
                        image="../../fotos/constancia laboral.png" tags='[{"label":"Derechos","color":"green"}]'
                        description="Guía paso a paso sobre el procedimiento legal para solicitar una constancia de trabajo en Perú."
                        readtime="4 min de lectura" views="8,920" url="certificado-constancia-laboral.html">
                    </post-card>
                </section>
                <aside class="catSide" aria-label="Sidebar">
                    <div data-include="../../componentes/site-sidebar.html"></div>
                </aside>
            </div>
    </main>

    <div data-include="../../componentes/site-footer.html"></div>
    <script defer src="../../assets/js/site-footer.js"></script>
    <script defer src="../../assets/js/includes.js"></script>
    <script defer src="../../assets/js/post-card.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>

</body>

</html>
